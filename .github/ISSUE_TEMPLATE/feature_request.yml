name: Feature request
description: Propose an improvement for theme quality, tooling, or docs.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What user problem or workflow pain should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe your preferred behavior or design.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Color language / token semantics
        - Interaction state visibility
        - Audit / quality gates
        - Release workflow
        - Docs / website
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or alternatives
      placeholder: Any constraints, rejected alternatives, or compatibility concerns.
